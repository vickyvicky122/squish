<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftSpace — Your calm workspace companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>

    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Gesture bridge: MediaPipe init/stop + hand skeleton drawing -->
    <script>
    window._handDetected = false;
    window._handLandmarks = null;
    window._gestureActive = false;

    window.initGesture = function() {
        if (window._gestureActive) return;
        window._gestureActive = true;

        // Hidden video element (feeds MediaPipe)
        var video = document.getElementById('gestureVideo');
        if (!video) {
            video = document.createElement('video');
            video.id = 'gestureVideo';
            video.autoplay = true;
            video.setAttribute('playsinline', '');
            video.style.display = 'none';
            document.body.appendChild(video);
        }

        // Canvas for hand skeleton overlay (visible)
        var canvas = document.getElementById('gestureCanvas');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'gestureCanvas';
            canvas.className = 'gesture-canvas';
            canvas.width = 320;
            canvas.height = 240;
            document.body.appendChild(canvas);
        }
        canvas.style.display = '';
        var ctx = canvas.getContext('2d');

        // Gesture label
        var label = document.getElementById('gestureLabel');
        if (!label) {
            label = document.createElement('div');
            label.id = 'gestureLabel';
            label.className = 'gesture-label';
            label.textContent = 'Loading model...';
            document.body.appendChild(label);
        }
        label.style.display = '';

        // Initialize MediaPipe Hands
        var hands = new Hands({
            locateFile: function(file) {
                return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
            }
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });
        hands.onResults(function(results) {
            // Store landmarks for Kotlin to read
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                window._handDetected = true;
                window._handLandmarks = results.multiHandLandmarks[0];
            } else {
                window._handDetected = false;
                window._handLandmarks = null;
            }

            // Draw webcam frame + hand skeleton on canvas
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.image) {
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            }
            if (results.multiHandLandmarks) {
                for (var i = 0; i < results.multiHandLandmarks.length; i++) {
                    var hand = results.multiHandLandmarks[i];
                    if (typeof drawConnectors !== 'undefined') {
                        drawConnectors(ctx, hand, HAND_CONNECTIONS,
                            {color: '#00FF88', lineWidth: 2});
                    }
                    if (typeof drawLandmarks !== 'undefined') {
                        drawLandmarks(ctx, hand,
                            {color: '#FF0088', lineWidth: 1, radius: 3});
                    }
                }
            }
            ctx.restore();
        });
        window._handsInstance = hands;

        // Camera utility: feeds video frames to MediaPipe
        var camera = new Camera(video, {
            onFrame: async function() {
                if (window._handsInstance && window._gestureActive) {
                    await window._handsInstance.send({image: video});
                }
            },
            width: 320,
            height: 240
        });
        camera.start();
        window._cameraInstance = camera;
    };

    window.stopGesture = function() {
        window._gestureActive = false;
        window._handDetected = false;
        window._handLandmarks = null;

        if (window._cameraInstance) {
            window._cameraInstance.stop();
            window._cameraInstance = null;
        }
        window._handsInstance = null;

        // Stop webcam stream
        var video = document.getElementById('gestureVideo');
        if (video && video.srcObject) {
            video.srcObject.getTracks().forEach(function(t) { t.stop(); });
            video.srcObject = null;
        }

        // Hide canvas + label
        var canvas = document.getElementById('gestureCanvas');
        if (canvas) {
            canvas.style.display = 'none';
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        var label = document.getElementById('gestureLabel');
        if (label) label.style.display = 'none';
    };
    </script>

    <script src="squishy-blob.js"></script>
</body>
</html>
