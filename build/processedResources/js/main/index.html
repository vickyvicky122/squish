<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftSpace — Your calm workspace companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>

    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Gesture bridge: MediaPipe init/stop + hand skeleton drawing -->
    <script>
    window._handDetected = false;
    window._handLandmarks = null;
    window._gestureActive = false;
    // Two-hand support
    window._handCount = 0;
    window._hand2Detected = false;
    window._hand2Landmarks = null;
    window._cameraPreviewOn = false;
    window._previewFrameCount = 0;

    window.initGesture = function() {
        if (window._gestureActive) return;
        window._gestureActive = true;

        // Hidden video element (feeds MediaPipe)
        var video = document.getElementById('gestureVideo');
        if (!video) {
            video = document.createElement('video');
            video.id = 'gestureVideo';
            video.autoplay = true;
            video.setAttribute('playsinline', '');
            video.style.display = 'none';
            document.body.appendChild(video);
        }

        // Canvas for hand skeleton overlay (visible)
        var canvas = document.getElementById('gestureCanvas');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'gestureCanvas';
            canvas.className = 'gesture-canvas';
            canvas.width = 160;
            canvas.height = 120;
            document.body.appendChild(canvas);
        }
        canvas.style.display = '';
        var ctx = canvas.getContext('2d');

        // Gesture label
        var label = document.getElementById('gestureLabel');
        if (!label) {
            label = document.createElement('div');
            label.id = 'gestureLabel';
            label.className = 'gesture-label';
            label.textContent = 'Loading model...';
            document.body.appendChild(label);
        }
        label.style.display = '';

        // Initialize MediaPipe Hands (2 hands for resize/pull gestures)
        var hands = new Hands({
            locateFile: function(file) {
                return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
            }
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.45
        });
        hands.onResults(function(results) {
            // Store landmarks for Kotlin to read (primary hand)
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                window._handDetected = true;
                window._handLandmarks = results.multiHandLandmarks[0];
                window._handCount = results.multiHandLandmarks.length;
                // Second hand support
                if (results.multiHandLandmarks.length > 1) {
                    window._hand2Detected = true;
                    window._hand2Landmarks = results.multiHandLandmarks[1];
                } else {
                    window._hand2Detected = false;
                    window._hand2Landmarks = null;
                }
            } else {
                window._handDetected = false;
                window._handLandmarks = null;
                window._handCount = 0;
                window._hand2Detected = false;
                window._hand2Landmarks = null;
            }

            // Draw webcam frame + hand skeleton on canvas
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.image) {
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            }
            if (results.multiHandLandmarks) {
                var colors = ['#00FF88', '#FF8800'];
                var dotColors = ['#FF0088', '#0088FF'];
                for (var i = 0; i < results.multiHandLandmarks.length; i++) {
                    var hand = results.multiHandLandmarks[i];
                    if (typeof drawConnectors !== 'undefined') {
                        drawConnectors(ctx, hand, HAND_CONNECTIONS,
                            {color: colors[i] || colors[0], lineWidth: 2});
                    }
                    if (typeof drawLandmarks !== 'undefined') {
                        drawLandmarks(ctx, hand,
                            {color: dotColors[i] || dotColors[0], lineWidth: 1, radius: 3});
                    }
                }
            }
            ctx.restore();

            // Draw to camera preview canvas if enabled (every 3rd frame)
            if (window._cameraPreviewOn) {
                window._previewFrameCount = (window._previewFrameCount || 0) + 1;
                if (window._previewFrameCount % 3 === 0) {
                var preview = document.getElementById('cameraPreview');
                if (preview) {
                    var pCtx = preview.getContext('2d');
                    pCtx.save();
                    pCtx.clearRect(0, 0, preview.width, preview.height);
                    if (results.image) {
                        pCtx.drawImage(results.image, 0, 0, preview.width, preview.height);
                    }
                    if (results.multiHandLandmarks) {
                        var previewColors = ['#00FF88', '#FF8800'];
                        var previewDots = ['#FF0088', '#0088FF'];
                        for (var j = 0; j < results.multiHandLandmarks.length; j++) {
                            var h = results.multiHandLandmarks[j];
                            if (typeof drawConnectors !== 'undefined') {
                                drawConnectors(pCtx, h, HAND_CONNECTIONS,
                                    {color: previewColors[j] || previewColors[0], lineWidth: 3});
                            }
                            if (typeof drawLandmarks !== 'undefined') {
                                drawLandmarks(pCtx, h,
                                    {color: previewDots[j] || previewDots[0], lineWidth: 1, radius: 4});
                            }
                        }
                    }
                    // Status text
                    pCtx.font = '13px Inter, sans-serif';
                    pCtx.fillStyle = window._handDetected ? '#00FF88' : '#FF4466';
                    pCtx.fillText(window._handDetected ? (window._handCount + ' hand(s) detected') : 'No hand detected', 12, 22);
                    pCtx.restore();
                }
                }
            }
        });
        window._handsInstance = hands;

        // Camera utility: feeds video frames to MediaPipe
        var camera = new Camera(video, {
            onFrame: async function() {
                if (window._handsInstance && window._gestureActive) {
                    await window._handsInstance.send({image: video});
                }
            },
            width: 240,
            height: 180
        });
        camera.start();
        window._cameraInstance = camera;
    };

    window.stopGesture = function() {
        window._gestureActive = false;
        window._handDetected = false;
        window._handLandmarks = null;
        window._handCount = 0;
        window._hand2Detected = false;
        window._hand2Landmarks = null;

        if (window._cameraInstance) {
            window._cameraInstance.stop();
            window._cameraInstance = null;
        }
        window._handsInstance = null;

        // Stop webcam stream
        var video = document.getElementById('gestureVideo');
        if (video && video.srcObject) {
            video.srcObject.getTracks().forEach(function(t) { t.stop(); });
            video.srcObject = null;
        }

        // Hide canvas + label
        var canvas = document.getElementById('gestureCanvas');
        if (canvas) {
            canvas.style.display = 'none';
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        var label = document.getElementById('gestureLabel');
        if (label) label.style.display = 'none';
    };
    </script>

    <script src="squishy-blob.js"></script>
</body>
</html>
